  yaml: "^2.8.3"
  axios: "^1.15.0"
  rollup: "^4.59.0"
  ajv: "^6.14.0"

allowBuilds:
  "@reown/appkit": true
  "@scarf/scarf": true
  bufferutil: true
  esbuild: true
  keccak: true
  secp256k1: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
  typescript-eslint: true
  sharp-libvips-darwin-arm64: true
  wordnet-db: true
  solc: true
  next: true
  edr-win32-x64-msvc: true

minimumReleaseAgeExclude:
  - "@neo-flowoff/shared@1.0.0"

peerDependencyRules:
