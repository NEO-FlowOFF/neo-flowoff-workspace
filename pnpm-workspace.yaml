    eslint-plugin-react>eslint: '10'
    fdir>picomatch: '4.0.4'
    '@nomicfoundation/hardhat-verify>hardhat': '2.28.6'
    '@nomicfoundation/hardhat-toolbox>@nomicfoundation/hardhat-verify': '3.0.20'
    '@nomicfoundation/hardhat-ignition>@nomicfoundation/hardhat-verify': '3.0.20'
    '@nomicfoundation/hardhat-toolbox>@types/chai': '5.2.3'
    '@nomicfoundation/hardhat-toolbox>chai': '6.2.2'
    '@nomicfoundation/hardhat-chai-matchers>chai': '6.2.2'
    'chai-as-promised>chai': '6.2.2'
    ws>utf-8-validate: '6.0.6'
    '@farcaster/quick-auth>typescript': '5.9.3'
    '@farcaster/miniapp-wagmi-connector>@farcaster/miniapp-sdk': '0.1.10'
    use-sync-external-store>react: '19.2.7'
    tailwindcss-animate>tailwindcss: '3.4.19'
    '@wagmi/core>typescript': '5.8.3'
    '@wagmi/connectors>typescript': '5.8.3'
    'wagmi>typescript': '5.8.3'
    'abitype>zod': '4.4.3'
    'lucide-react>react': '19.0.0'
    'next>react': '19.0.0'
    'next>react-dom': '19.0.0'
    '@eslint/js>eslint': '9.39.4'
allowedDeprecatedVersions:
  request: "*"
